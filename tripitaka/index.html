<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>බුද්ධ ජයන්ති ත්‍රිපිටකය · Buddha Jayanti Tripiṭaka</title>
<meta name="description" content="Pāli–Sinhala Buddha Jayanti Tripiṭaka, sourced from tipitaka.lk (CC BY-ND 4.0).">
<style>
  :root{
    --bg:#f7f5f0; --panel:#fffdf8; --ink:#23201a; --muted:#6b6459;
    --line:#e4ddd0; --accent:#7a5b34; --accent-soft:#efe7d8; --pali:#3a4a5a;
    --fs:1.05rem; --maxw:720px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#14120e; --panel:#1c1a15; --ink:#e9e3d6; --muted:#9a9184;
           --line:#2c2820; --accent:#c8a878; --accent-soft:#2a251c; --pali:#9db4c9; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Noto Serif","Iskoola Pota","Noto Sans Sinhala",Georgia,serif;
    line-height:1.75; -webkit-text-size-adjust:100%;
  }
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}

  header{
    position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:.55rem;
    padding:.55rem .9rem;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap;
  }
  header .brand{font-weight:600;font-size:1.0rem;margin-right:auto;letter-spacing:.2px;line-height:1.2}
  header .brand small{display:block;font-weight:400;color:var(--muted);font-size:.7rem}
  header button, header a.btn{
    font:inherit;font-size:.82rem;cursor:pointer;background:transparent;color:var(--ink);
    border:1px solid var(--line);border-radius:7px;padding:.26rem .55rem;
  }
  header button.active{background:var(--accent-soft);border-color:var(--accent)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{border:0;border-radius:0;border-left:1px solid var(--line)}
  .seg button:first-child{border-left:0}

  .layout{display:flex;min-height:calc(100% - 3rem)}
  nav#side{
    width:320px;flex:0 0 320px;border-right:1px solid var(--line);background:var(--panel);
    height:calc(100vh - 3.05rem);overflow:auto;position:sticky;top:3.05rem;padding:.5rem;
  }
  nav#side input{
    width:100%;font:inherit;font-size:.85rem;padding:.42rem .55rem;margin-bottom:.4rem;
    border:1px solid var(--line);border-radius:7px;background:var(--bg);color:var(--ink);
  }
  ul.tree,ul.tree ul{list-style:none;margin:0;padding:0}
  ul.tree ul{margin-left:.7rem;border-left:1px solid var(--line);padding-left:.35rem}
  .row{display:flex;align-items:flex-start;gap:.25rem;border-radius:6px;padding:.2rem .3rem;cursor:pointer}
  .row:hover{background:var(--accent-soft)}
  .row.active{background:var(--accent-soft)}
  .row.active .si{color:var(--accent);font-weight:600}
  .tog{flex:0 0 1rem;color:var(--muted);font-size:.7rem;line-height:1.7;user-select:none;text-align:center}
  .lbl{flex:1;min-width:0;font-size:.9rem}
  .lbl .si{display:block}
  .lbl .pa{display:block;color:var(--muted);font-size:.72rem}
  li.leaf>.row .tog{visibility:hidden}
  .crumb{color:var(--muted);font-size:.68rem;display:block}

  main{flex:1;min-width:0;padding:1.3rem clamp(1rem,4vw,3rem);overflow:auto}
  .reader{max-width:var(--maxw);margin:0 auto;font-size:var(--fs)}
  .booktitle{font-size:1.5rem;margin:.2rem 0 .1rem;line-height:1.35}
  .booktitle small{display:block;color:var(--pali);font-size:1rem;font-weight:400;margin-top:.15rem}
  .page{border-top:1px dashed var(--line);margin-top:1.4rem;padding-top:.4rem}
  .page:first-of-type{border-top:0}
  .pagenum{color:var(--muted);font-size:.72rem;letter-spacing:.4px;margin-bottom:.35rem}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem}
  .col h3{font-size:1.05rem;margin:1.1rem 0 .3rem;color:var(--accent);scroll-margin-top:4rem}
  .col h3.hl{background:var(--accent-soft);border-radius:5px;padding:.1rem .3rem}
  .col .lvl3{font-size:.98rem}
  .col p{margin:.55rem 0}
  .col .centered{text-align:center;font-weight:600}
  .col.pali{color:var(--pali)}
  .col .fn{margin-top:.9rem;padding-top:.5rem;border-top:1px solid var(--line);font-size:.8rem;color:var(--muted);line-height:1.5}

  body.view-si .col.pali,body.view-pa .col.sinh{display:none}
  body.view-si .cols,body.view-pa .cols{grid-template-columns:1fr;max-width:640px}

  /* About panel */
  #about{display:none;max-width:var(--maxw);margin:0 auto;font-size:var(--fs)}
  body.show-about #about{display:block}
  body.show-about #reader,body.show-about #hint{display:none}
  #about h1{font-size:1.5rem;margin:.2rem 0 .6rem}
  #about h2{font-size:1.1rem;color:var(--accent);margin:1.4rem 0 .3rem}
  #about .si{color:var(--muted)}

  @media(max-width:820px){
    nav#side{position:fixed;left:0;top:3.05rem;bottom:0;transform:translateX(-100%);
             transition:transform .2s;z-index:20;box-shadow:0 0 30px rgba(0,0,0,.25);width:88vw;max-width:340px}
    body.nav-open nav#side{transform:none}
    .cols{grid-template-columns:1fr;gap:.4rem}
    body:not(.view-pa):not(.view-si) .col.pali{border-top:1px solid var(--line);margin-top:.6rem;padding-top:.6rem}
    #menuBtn{display:inline-block}
  }
  #menuBtn{display:none}
  .hint{color:var(--muted);max-width:var(--maxw);margin:2rem auto;text-align:center}
  footer{max-width:var(--maxw);margin:2.5rem auto 1rem;padding-top:1rem;border-top:1px solid var(--line);color:var(--muted);font-size:.78rem;line-height:1.6}
</style>
</head>
<body>
<header>
  <button id="menuBtn" aria-label="Menu">☰</button>
  <div class="brand">බුද්ධ ජයන්ති ත්‍රිපිටකය
    <small>Buddha Jayanti Tripiṭaka · Pāli–Sinhala</small></div>
  <div class="seg" role="group" aria-label="View">
    <button data-view="both" class="active">දෙකම</button>
    <button data-view="pa">පාලි</button>
    <button data-view="si">සිංහල</button>
  </div>
  <button id="fdown" aria-label="Smaller text">A−</button>
  <button id="fup" aria-label="Larger text">A+</button>
  <button id="aboutBtn">විස්තර · About</button>
  <a class="btn" href="/" title="Back to library">↩ Library</a>
</header>

<div class="layout">
  <nav id="side">
    <input id="filter" type="search" placeholder="Search suttas… / සූත්‍ර සොයන්න">
    <ul id="tree" class="tree"></ul>
  </nav>
  <main>
    <div id="reader" class="reader"></div>
    <div id="hint" class="hint">Select a text from the list to begin reading.<br>ආරම්භ කිරීමට වම් පස ලැයිස්තුවෙන් තෝරන්න.</div>
    <section id="about"></section>
    <footer id="foot"></footer>
  </main>
</div>

<script>
const TEXT_DIR="static/text/";
let books=null, byId={}, currentFile=null;
const $=s=>document.querySelector(s);
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmt=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
const norm=s=>(s||"").replace(/[\s​‌‍]/g,"").toLowerCase();

// node = [id, sinh, pali, file, children[]]
function indexTree(node,parentFile,parentId){
  const file=node[3]||parentFile;
  byId[node[0]]={n:node,file:file,parent:parentId};
  node[4].forEach(c=>indexTree(c,file,node[0]));
}

// ---- nav rendering (lazy) ----------------------------------------------
function makeLi(node){
  const li=document.createElement("li");
  li.dataset.id=node[0];
  if(!node[4].length) li.className="leaf";
  const row=document.createElement("div"); row.className="row";
  row.innerHTML=`<span class="tog">${node[4].length?"▸":""}</span>`+
    `<span class="lbl"><span class="si">${esc(node[1])}</span>`+
    (node[2]?`<span class="pa">${esc(node[2])}</span>`:"")+`</span>`;
  li.appendChild(row);
  const tog=row.querySelector(".tog");
  tog.addEventListener("click",e=>{e.stopPropagation();toggle(li,node);});
  row.addEventListener("click",()=>openNode(node[0]));
  return li;
}
function toggle(li,node){
  let ul=li.querySelector(":scope>ul");
  if(ul){ const open=ul.style.display!=="none"; ul.style.display=open?"none":"";
          li.querySelector(".tog").textContent=open?"▸":"▾"; return; }
  if(!node[4].length) return;
  ul=document.createElement("ul");
  node[4].forEach(c=>ul.appendChild(makeLi(c)));
  li.appendChild(ul);
  li.querySelector(".tog").textContent="▾";
}
function expandTo(id){
  const chain=[]; let cur=byId[id];
  while(cur){ chain.unshift(cur.n[0]); cur=cur.parent?byId[cur.parent]:null; }
  let ul=$("#tree");
  chain.forEach(nid=>{
    let li=ul.querySelector(`:scope>li[data-id="${CSS.escape(nid)}"]`);
    if(!li) return;
    const node=byId[nid].n;
    if(node[4].length){ let sub=li.querySelector(":scope>ul");
      if(!sub){ toggle(li,node); } else if(sub.style.display==="none"){ toggle(li,node); } }
    ul=li.querySelector(":scope>ul")||ul;
  });
  const target=$("#tree").querySelector(`li[data-id="${CSS.escape(id)}"]>.row`);
  if(target){ document.querySelectorAll(".row.active").forEach(r=>r.classList.remove("active"));
    target.classList.add("active"); target.scrollIntoView({block:"nearest"}); }
}

// ---- reading ------------------------------------------------------------
function renderColumn(col,cls){
  let html="";
  (col.entries||[]).forEach(e=>{const t=e.text||"";
    if(e.type==="heading"){const l=e.level>=3?" lvl3":"";
      html+=`<h3 class="h${e.level||2}${l}" data-h="${norm(t)}">${fmt(t)}</h3>`;}
    else if(e.type==="centered") html+=`<p class="centered">${fmt(t)}</p>`;
    else html+=`<p>${fmt(t)}</p>`;});
  const fns=col.footnotes||[];
  if(fns.length) html+=`<div class="fn">`+fns.map(f=>fmt(f.text||"")).join("<br>")+`</div>`;
  return `<div class="col ${cls}">${html}</div>`;
}
async function openNode(id){
  const rec=byId[id]; if(!rec) return;
  document.body.classList.remove("show-about","nav-open");
  expandTo(id);
  const file=rec.file;
  $("#hint").style.display="none";
  if(currentFile!==file){
    $("#reader").innerHTML=`<p class="hint">Loading…</p>`;
    let doc;
    try{ doc=await (await fetch(TEXT_DIR+file+".json",{cache:"force-cache"})).json(); }
    catch(err){ $("#reader").innerHTML=`<p class="hint">Could not load ${esc(file)}.</p>`; return; }
    currentFile=file;
    let html=`<h1 class="booktitle">${esc(rec.n[1])}`+(rec.n[2]?`<small>${esc(rec.n[2])}</small>`:"")+`</h1>`;
    (doc.pages||[]).forEach(pg=>{
      html+=`<section class="page"><div class="pagenum">පිටුව ${pg.pageNum}</div><div class="cols">`+
            renderColumn(pg.pali||{},"pali")+renderColumn(pg.sinh||{},"sinh")+`</div></section>`;
    });
    $("#reader").innerHTML=html;
  }
  // scroll to the heading matching this node's Pāli name
  const key=norm(rec.n[2]||rec.n[1]);
  let h=null;
  if(key) h=[...document.querySelectorAll("#reader h3[data-h]")].find(x=>x.dataset.h.includes(key)||key.includes(x.dataset.h));
  document.querySelectorAll("#reader h3.hl").forEach(x=>x.classList.remove("hl"));
  if(h){ h.classList.add("hl"); h.scrollIntoView({block:"start"}); } else window.scrollTo(0,0);
  history.replaceState(null,"","#"+encodeURIComponent(id));
}

// ---- search -------------------------------------------------------------
function search(q){
  const tree=$("#tree");
  if(!q||norm(q).length<2){ tree.dataset.mode=""; tree.innerHTML=""; books.tree.forEach(n=>tree.appendChild(makeLi(n))); return; }
  const nq=norm(q), out=[];
  function walk(node,path){
    if(out.length>=500) return;
    if(norm(node[1]+" "+node[2]).includes(nq)) out.push([node[0],node[1],node[2],path]);
    node[4].forEach(c=>walk(c, path?path+" › "+node[1]:node[1]));
  }
  books.tree.forEach(r=>walk(r,""));
  tree.dataset.mode="search"; tree.innerHTML="";
  out.slice(0,500).forEach(r=>{
    const li=document.createElement("li"); li.className="leaf";
    li.innerHTML=`<div class="row"><span class="tog"></span><span class="lbl">`+
      `<span class="si">${esc(r[1])}</span>`+(r[2]?`<span class="pa">${esc(r[2])}</span>`:"")+
      (r[3]?`<span class="crumb">${esc(r[3])}</span>`:"")+`</span></div>`;
    li.querySelector(".row").addEventListener("click",()=>{ $("#filter").value=""; search(""); openNode(r[0]); });
    tree.appendChild(li);
  });
  if(!out.length) tree.innerHTML=`<li style="color:var(--muted);padding:.5rem">No matches. / ගැළපීම් නැත.</li>`;
}

// ---- controls -----------------------------------------------------------
function setView(v){ document.body.classList.remove("view-both","view-pa","view-si");
  document.body.classList.add("view-"+v);
  document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  localStorage.setItem("tp_view",v); }
function setFont(px){ px=Math.min(1.7,Math.max(.85,px));
  document.documentElement.style.setProperty("--fs",px+"rem"); localStorage.setItem("tp_fs",px); }

$("#filter").addEventListener("input",e=>search(e.target.value));
document.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
$("#fup").onclick=()=>setFont(parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--fs"))+.08);
$("#fdown").onclick=()=>setFont(parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--fs"))-.08);
$("#menuBtn").onclick=()=>document.body.classList.toggle("nav-open");
$("#aboutBtn").onclick=()=>{document.body.classList.toggle("show-about");document.body.classList.remove("nav-open");};
window.addEventListener("hashchange",()=>{const id=decodeURIComponent(location.hash.slice(1)); if(id&&byId[id]) openNode(id);});

const ABOUT=`
<h1>ත්‍රිපිටකය · About this Tripiṭaka</h1>
<p>This is the <strong>Buddha Jayanti Tripiṭaka</strong> — the Pāli canon with its
classical Sinhala translation, prepared under the Sri Lankan government's Buddha
Jayanti edition (1956–1990) and digitised by the Path Nirvana Foundation.
It is presented here as a companion to the Vidyā Udapādi discussions: those talks
turn on close reading of Pāli phrases, so the Pāli is shown beside the Sinhala,
unaltered, for you to check for yourself.</p>
<p class="si">මෙය බුද්ධ ජයන්ති ත්‍රිපිටකයයි — පාලි මූල පාඨය සහ එහි සිංහල පරිවර්තනය
එකට. විද්‍යා උදපාදි සාකච්ඡාවලට අනුබද්ධව, පාලි වචන ම කියවා බැලීම සඳහා පාලිය සහ
සිංහලය පැත්තෙන් පැත්තට දක්වා ඇත.</p>

<h2>How to use it</h2>
<p>Browse the tree on the left: Piṭaka → Nikāya → Vagga → Sutta. Click any entry to
open its text and jump to it. Use <em>දෙකම / පාලි / සිංහල</em> to show both columns
or one, <em>A− / A+</em> to size the text, and the search box to find a sutta by
name in Pāli or Sinhala. Every entry has a link (the address bar updates), so a
passage can be cited or shared.</p>

<h2>Source &amp; licence</h2>
<p>Text: the Buddha Jayanti Tripiṭaka from
<a href="https://tipitaka.lk" rel="noopener">tipitaka.lk</a>
(<a href="https://github.com/pathnirvana/tipitaka.lk" rel="noopener">source</a>),
used under <a href="https://creativecommons.org/licenses/by-nd/4.0/" rel="noopener">CC BY-ND 4.0</a>.
The text is reproduced <strong>unmodified</strong>. If you find an error, please report it
upstream to the Path Nirvana Foundation (path.nirvana@gmail.com) rather than expecting a
change here; corrections flow back when this section is next synced.</p>
<p>With gratitude to those who keyed, proofread, and freely shared this edition.</p>
`;

(async function(){
  setView(localStorage.getItem("tp_view")||"both");
  const fs=parseFloat(localStorage.getItem("tp_fs")); if(fs) setFont(fs);
  $("#about").innerHTML=ABOUT;
  try{ books=await (await fetch("books.json",{cache:"no-cache"})).json(); }
  catch(err){ $("#hint").innerHTML="books.json not found. Run the sync script to fetch the text and build the index."; return; }
  books.tree.forEach(n=>indexTree(n,"",null));
  books.tree.forEach(n=>$("#tree").appendChild(makeLi(n)));
  $("#foot").innerHTML=`Text: <a href="${books.sourceUrl}" rel="noopener">${esc(books.source)}</a>, `+
    `licensed <a href="https://creativecommons.org/licenses/by-nd/4.0/" rel="noopener">${esc(books.license)}</a>. Presented unmodified.`;
  const id=decodeURIComponent(location.hash.slice(1));
  if(id&&byId[id]) openNode(id);
})();
</script>
</body>
</html>
